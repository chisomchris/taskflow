<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="wrapper header-content">
        <div class="logo">
          <div class="logo-icon"></div>
          <h1>TaskFlow</h1>
        </div>

        <div class="header-meta">
          <div class="user-profile">
            <div class="avatar">CE</div>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="wrapper">
        <article class="todo-card" data-testid="test-todo-card">
          <div class="card-layout">
            <div class="checkbox-wrapper">
              <input
                type="checkbox"
                id="todo-toggle"
                data-testid="test-todo-complete-toggle"
              />
              <label for="todo-toggle" class="sr-only"
                >Mark task as complete</label
              >
            </div>

            <div class="card-content">
              <div class="card-header">
                <h2 data-testid="test-todo-title">Complete all stage 0 tasks</h2>
                <span
                  class="priority-badge high"
                  data-testid="test-todo-priority"
                  aria-label="task priority"
                  >High</span
                >
              </div>

              <p class="description" data-testid="test-todo-description">
                Build a high-fidelity Task Card component using Vanilla HTML,
                CSS, and JS. Ensure all data-testids match requirements and
                deploy for evaluation.
              </p>

              <ul class="tags-list" data-testid="test-todo-tags" role="list">
                <li data-testid="test-todo-tag-frontend">Frontend</li>
                <li data-testid="test-todo-tag-hng">HNG</li>
                <li data-testid="test-todo-tag-urgent">Urgent</li>
              </ul>

              <div class="card-footer">
                <div class="date-info">
                  <time
                    id="time-remaining"
                    data-testid="test-todo-time-remaining"
                    class="countdown"
                  ></time>
                  <time
                    id="due-date-display"
                    data-testid="test-todo-due-date"
                  ></time>
                </div>
                <div class="card-meta">
                  <span class="status-indicator" data-testid="test-todo-status">
                    In Progress
                  </span>
                  <div class="card-actions">
                    <button
                      class="icon-btn"
                      data-testid="test-todo-edit-button"
                      aria-label="Edit task"
                    >
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                        ></path>
                        <path
                          d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                        ></path>
                      </svg>
                    </button>
                    <button
                      class="icon-btn delete"
                      data-testid="test-todo-delete-button"
                      aria-label="Delete task"
                    >
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path
                          d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                        ></path>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </div>
    </main>

    <footer class="app-footer">
      <div class="wrapper footer-content">
        <p>
          &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          TaskFlow. All rights reserved.
        </p>
        <p class="attribution">
          Built with
          <a
            href="https://gemini.google.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span>Gemini</span>
          </a>
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
